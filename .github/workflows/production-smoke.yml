name: Production stock page smoke test

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 2-6"

permissions:
  contents: read

jobs:
  stock-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Check radar candidates
        run: bash scripts/smoke-production.sh
